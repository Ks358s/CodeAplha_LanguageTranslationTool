<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swift Language</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 h-screen flex flex-col overflow-hidden font-sans">

    <header class="shrink-0 border-b border-zinc-800 bg-zinc-900/80 backdrop-blur-sm px-4 py-4 md:px-8">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-amber-300 flex items-center gap-3">
                    <i class="fa-solid fa-bolt text-3xl text-orange-400"></i>
                    Swift Language
                </h1>
                <p class="text-zinc-500 mt-1 text-sm">Translate text smoothly across multiple languages in real-time.</p>
            </div>

            <div class="flex flex-col sm:flex-row items-stretch sm:items-end gap-3 lg:gap-4 flex-1 lg:max-w-2xl lg:ml-auto">
                <div class="flex-1 min-w-0">
                    <label for="sourceLanguage" class="block text-xs font-semibold uppercase tracking-wider text-zinc-500 mb-1.5">Source</label>
                    <select id="sourceLanguage" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2.5 text-zinc-100 font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all">
                        <option value="en" selected>English</option>
                        <option value="es">Spanish (Español)</option>
                        <option value="fr">French (Français)</option>
                        <option value="de">German (Deutsch)</option>
                        <option value="hi">Hindi (हिन्दी)</option>
                        <option value="zh">Chinese (中文)</option>
                        <option value="ja">Japanese (日本語)</option>
                    </select>
                </div>

                <button id="swapLanguages" class="self-center sm:mb-0.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-orange-400 p-2.5 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-orange-500 shrink-0" title="Swap Languages">
                    <i class="fa-solid fa-arrows-rotate text-lg custom-swap-icon"></i>
                </button>

                <div class="flex-1 min-w-0">
                    <label for="targetLanguage" class="block text-xs font-semibold uppercase tracking-wider text-zinc-500 mb-1.5">Target</label>
                    <select id="targetLanguage" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2.5 text-zinc-100 font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all">
                        <option value="en">English</option>
                        <option value="es" selected>Spanish (Español)</option>
                        <option value="fr">French (Français)</option>
                        <option value="de">German (Deutsch)</option>
                        <option value="hi">Hindi (हिन्दी)</option>
                        <option value="zh">Chinese (中文)</option>
                        <option value="ja">Japanese (日本語)</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <!-- Full-page workspace -->
    <main class="flex-1 flex flex-col min-h-0">
        <div class="flex-1 grid grid-cols-1 md:grid-cols-2 min-h-0 divide-y md:divide-y-0 md:divide-x divide-zinc-800">
            <section class="flex flex-col min-h-0 bg-zinc-900/40">
                <div class="shrink-0 flex justify-between items-center px-4 py-2 border-b border-zinc-800/80">
                    <span class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Input</span>
                    <div class="flex items-center gap-3">
                        <span id="charCount" class="text-xs text-zinc-500">0 / 5000</span>
                        <button id="clearText" class="text-xs text-zinc-500 hover:text-rose-400 transition-colors hidden font-medium">
                            <i class="fa-solid fa-trash-can mr-1"></i> Clear
                        </button>
                    </div>
                </div>
                <textarea id="inputText" placeholder="Type or paste your text here..." maxlength="5000"
                    class="flex-1 w-full p-4 md:p-6 resize-none focus:outline-none text-zinc-100 placeholder-zinc-600 bg-transparent min-h-[200px] md:min-h-0"></textarea>
            </section>

            <section class="flex flex-col min-h-0 bg-zinc-900/20">
                <div class="shrink-0 flex justify-between items-center px-4 py-2 border-b border-zinc-800/80">
                    <span class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Translation</span>
                    <div id="outputActions" class="flex gap-2 opacity-50 pointer-events-none transition-opacity duration-200">
                        <button id="copyBtn" class="flex items-center gap-1.5 px-2.5 py-1 bg-zinc-800 border border-zinc-700 rounded-md text-xs font-semibold text-zinc-300 hover:bg-zinc-700 hover:text-orange-400 active:scale-95 transition-all" title="Copy to clipboard">
                            <i class="fa-regular fa-copy"></i> Copy
                        </button>
                    </div>
                </div>
                <div id="outputTextContainer" class="flex-1 p-4 md:p-6 text-zinc-100 select-all overflow-y-auto relative whitespace-pre-wrap min-h-[200px] md:min-h-0">
                    <span id="outputPlaceholder" class="text-zinc-600 italic">Translation will appear here...</span>
                    <p id="outputText" class="hidden"></p>
                    <div id="loadingOverlay" class="absolute inset-0 bg-zinc-950/70 flex items-center justify-center hidden">
                        <div class="animate-spin rounded-full h-8 w-8 border-4 border-orange-500 border-t-transparent"></div>
                    </div>
                </div>
            </section>
        </div>

        <div class="shrink-0 border-t border-zinc-800 px-4 py-2.5 md:px-8 bg-zinc-900/60">
            <div class="flex flex-wrap items-center justify-center gap-2 md:gap-3">
                <button id="translateBtn" class="action-btn action-btn-primary">
                    <i class="fa-solid fa-language"></i>
                    Translate
                </button>
                <button id="readAloudBtn" class="action-btn action-btn-secondary" disabled title="Read translation aloud">
                    <i class="fa-solid fa-volume-high"></i>
                    Read Aloud
                </button>
                <button id="refreshBtn" class="action-btn action-btn-secondary" disabled title="Re-translate current text">
                    <i class="fa-solid fa-rotate-right"></i>
                    Refresh
                </button>
            </div>
        </div>
    </main>

    <footer class="shrink-0 py-2.5 text-center text-xs text-zinc-600 border-t border-zinc-800 bg-zinc-900/80">
        &copy; 2026 Swift Language.
    </footer>

    <script src="script.js"></script>
</body>
</html>
